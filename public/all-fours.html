<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>All Fours</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deepest:#0d0a14;--bg-deep:#130e1f;--bg-surface:#1e1530;--bg-raised:#2a1e47;--bg-hover:#341f5c;
  --purple-dim:#4a2e80;--purple-mid:#6b3fa0;--purple-bright:#9b5de5;--purple-glow:#c77dff;--purple-soft:#d8b4fe;
  --gold:#f0c040;--gold-dim:#a8852a;
  --text-primary:#ede8f7;--text-secondary:#a89bc4;--text-muted:#6b5f80;
  --border-subtle:#2e224a;--border-accent:#6b3fa0;
  --success:#4ade80;--danger:#f87171;--teamA:#60a5fa;--teamB:#f472b6;
  --radius-sm:6px;--radius-md:12px;--radius-lg:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg-deepest);color:var(--text-primary)}
body{background-image:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(107,63,160,.3) 0%,transparent 60%)}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:1}
.screen.active{display:flex}
#lobby{background:var(--bg-deep)}
.game-title{font-family:'Cinzel',serif;font-size:clamp(2rem,8vw,3.5rem);font-weight:700;color:var(--text-primary);text-align:center;letter-spacing:.05em;text-shadow:0 0 40px rgba(155,93,229,.5)}
.game-subtitle{font-size:.85rem;color:var(--text-muted);text-align:center;margin-top:.3rem;letter-spacing:.15em;text-transform:uppercase}
.lobby-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.8rem;width:100%;max-width:380px;margin-top:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lobby-card h2{font-family:'Cinzel',serif;font-size:1rem;color:var(--purple-glow);margin-bottom:1.1rem;text-align:center;letter-spacing:.05em}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.75rem;color:var(--text-muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.08em}
.field input{width:100%;background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:.6rem .9rem;color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:.2s}
.field input:focus{border-color:var(--purple-bright);box-shadow:0 0 0 3px rgba(155,93,229,.15)}
.field input::placeholder{color:var(--text-muted)}
.btn{font-family:'Outfit',sans-serif;font-weight:600;padding:.6rem 1.2rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.9rem;transition:.2s;width:100%;margin-top:.4rem;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--purple-mid);color:#fff;border:1px solid var(--purple-bright)}
.btn-primary:hover:not(:disabled){background:var(--purple-bright);box-shadow:0 0 20px rgba(155,93,229,.4)}
.btn-secondary{background:var(--bg-raised);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.btn-secondary:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary)}
.btn-gold{background:var(--gold-dim);color:#fff;border:1px solid var(--gold);font-family:'Cinzel',serif}
.btn-gold:hover:not(:disabled){background:var(--gold);color:var(--bg-deepest);box-shadow:0 0 20px rgba(240,192,64,.4)}
.btn-sm{padding:.38rem .85rem;font-size:.82rem;width:auto;margin-top:0}
.divider{display:flex;align-items:center;gap:.7rem;margin:.9rem 0;color:var(--text-muted);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger);border-radius:var(--radius-sm);padding:.55rem .9rem;font-size:.82rem;margin-top:.7rem;display:none}

/* Waiting */
#waiting{background:var(--bg-deep)}
.waiting-box{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1.8rem;max-width:400px;width:100%}
.room-code{font-family:'Cinzel',serif;font-size:2.4rem;letter-spacing:.18em;color:var(--gold);text-align:center;text-shadow:0 0 20px rgba(240,192,64,.4);margin:.5rem 0}
.p-slot{display:flex;align-items:center;gap:.7rem;padding:.6rem .9rem;border-radius:var(--radius-sm);margin-bottom:.4rem;border:1px solid var(--border-subtle);background:var(--bg-raised)}
.p-slot.filled{border-color:var(--border-accent)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.p-slot.filled .dot{background:var(--success)}
.p-slot-name{flex:1;font-size:.88rem;color:var(--text-secondary)}
.p-slot.filled .p-slot-name{color:var(--text-primary)}
.t-tag{font-size:.7rem;font-weight:600;padding:.12rem .45rem;border-radius:20px}
.ta{background:rgba(96,165,250,.15);color:var(--teamA)}
.tb{background:rgba(244,114,182,.15);color:var(--teamB)}

/* Game */
#game{background:var(--bg-deepest);padding:0;overflow:hidden}
.game-wrap{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.45rem .75rem;background:var(--bg-deep);border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.score-box{display:flex;gap:.4rem;align-items:center}
.score-team{display:flex;flex-direction:column;align-items:center;min-width:42px}
.score-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.score-val{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;color:var(--gold);line-height:1}
.score-vs{color:var(--text-muted);font-size:.72rem;margin:0 .15rem}
.trump-badge{display:flex;align-items:center;gap:.25rem;padding:.22rem .6rem;background:var(--bg-raised);border-radius:20px;border:1px solid var(--border-subtle)}
.trump-sym{font-size:1.25rem;line-height:1}
.trump-lbl{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em}
.action-bar{font-size:.76rem;color:var(--text-secondary);text-align:center;padding:.28rem .5rem;background:var(--bg-deep);border-bottom:1px solid var(--border-subtle);min-height:22px;flex-shrink:0}
.table-area{flex:1;position:relative;min-height:0;display:flex;flex-direction:column}
.felt{flex:1;position:relative;background:linear-gradient(145deg,#150f25 0%,#1c1232 50%,#150f25 100%);margin:.4rem;border-radius:var(--radius-md);box-shadow:inset 0 0 60px rgba(0,0,0,.5),0 0 0 1px var(--border-subtle)}
.opp-top{position:absolute;top:.45rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.15rem;z-index:5}
.opp-side{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:.15rem;z-index:5}
.opp-left{left:.35rem}
.opp-right{right:.35rem}
.opp-name{font-size:.62rem;color:var(--text-secondary);text-align:center;max-width:58px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.opp-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg-raised);border:2px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:.3s}
.opp-avatar.is-turn{border-color:var(--success);box-shadow:0 0 12px rgba(74,222,128,.5)}
.opp-avatar.is-dealer{border-color:var(--gold)}
.mini-hand{display:flex}
.mc{width:8px;height:12px;background:var(--purple-dim);border-radius:2px;border:1px solid var(--purple-bright);margin:0 1px}
.turnup-area{position:absolute;top:.35rem;right:.35rem;z-index:5;text-align:center}
.turnup-lbl{font-size:.52rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.12rem}
.trick-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:170px;height:170px;display:grid;grid-template-columns:1fr 54px 1fr;grid-template-rows:1fr 54px 1fr;gap:3px;z-index:4}
.ts{display:flex;align-items:center;justify-content:center}
.ts.t-top{grid-column:2;grid-row:1;align-items:flex-end}
.ts.t-left{grid-column:1;grid-row:2;justify-content:flex-end}
.ts.t-center{grid-column:2;grid-row:2}
.ts.t-right{grid-column:3;grid-row:2}
.ts.t-bottom{grid-column:2;grid-row:3;align-items:flex-start}
.phase-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-surface);border:1px solid var(--border-accent);border-radius:var(--radius-md);padding:.9rem 1.1rem;text-align:center;z-index:20;min-width:190px;max-width:240px;box-shadow:0 8px 30px rgba(0,0,0,.6),0 0 20px rgba(155,93,229,.15)}
.phase-banner h3{font-family:'Cinzel',serif;font-size:.88rem;color:var(--purple-glow);margin-bottom:.4rem}
.phase-banner p{font-size:.76rem;color:var(--text-secondary);margin-bottom:.7rem}
.btn-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap}
.hand-area{flex-shrink:0;background:var(--bg-surface);border-top:1px solid var(--border-subtle);padding:.45rem .45rem .5rem}
.hand-lbl{font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.28rem;display:flex;align-items:center;gap:.4rem}
.you-name{color:var(--purple-glow);font-weight:600}
.hand-cards{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}

/* Cards */
.card{display:inline-block;width:42px;height:62px;border-radius:5px;background:#fff;border:1px solid #d0d0d0;position:relative;cursor:default;user-select:none;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card.playable{cursor:pointer;transition:transform .15s,box-shadow .15s}
.card.playable:hover{transform:translateY(-7px) scale(1.04);box-shadow:0 10px 24px rgba(155,93,229,.55);z-index:10}
.card.playable:active{transform:translateY(-3px)}
.card.back{background:linear-gradient(135deg,var(--purple-dim),var(--bg-raised));border-color:var(--purple-mid)}
.card.back::after{content:'';position:absolute;inset:3px;border:1px solid rgba(155,93,229,.35);border-radius:3px;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(155,93,229,.09) 4px,rgba(155,93,229,.09) 5px)}
.card-inner{padding:2px 3px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.cr{font-size:.68rem;font-weight:700;line-height:1}
.cs{font-size:.58rem;line-height:1}
.cc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.35rem;opacity:.65}
.red{color:#dc2626}.black{color:#1a1a2e}
.card.sm{width:34px;height:50px}
.card.sm .cr{font-size:.58rem}.card.sm .cs{font-size:.5rem}.card.sm .cc{font-size:.95rem}
.card.tiny{width:26px;height:38px}
.card.tiny .cr{font-size:.5rem}.card.tiny .cs{font-size:.44rem}.card.tiny .cc{font-size:.75rem}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(13,10,20,.82);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--bg-surface);border:1px solid var(--border-accent);border-radius:var(--radius-lg);padding:1.4rem;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 30px rgba(155,93,229,.18)}
.modal h2{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--purple-glow);margin-bottom:.9rem;text-align:center}
.sum-table{width:100%;border-collapse:collapse;font-size:.82rem;margin:.7rem 0}
.sum-table th{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.07em;color:var(--purple-glow);padding:.38rem;border-bottom:1px solid var(--border-subtle);text-align:left}
.sum-table td{padding:.38rem;border-bottom:1px solid rgba(46,34,74,.45);color:var(--text-primary)}
.sum-table td:not(:first-child){text-align:center}
.pts{font-weight:600}
.total-row td{font-weight:700;border-top:1px solid var(--border-accent)}
.modal-actions{display:flex;gap:.5rem;margin-top:1.1rem;flex-wrap:wrap}
.modal-actions .btn{flex:1;min-width:110px}
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg-raised);border:1px solid var(--border-accent);border-radius:var(--radius-md);padding:.55rem 1.1rem;color:var(--text-primary);font-size:.82rem;opacity:0;transition:.3s;z-index:100;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.is-err{border-color:var(--danger);color:var(--danger)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg-deepest)}::-webkit-scrollbar-thumb{background:var(--purple-dim);border-radius:4px}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="game-title">All Fours</div>
  <div class="game-subtitle">Trinidad Card Game · 4 Players</div>
  <div class="lobby-card">
    <h2>Enter the Table</h2>
    <div class="field">
      <label>Your Name</label>
      <input id="inpName" type="text" placeholder="Your name" maxlength="14" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="doCreate()">Create Room</button>
    <div class="divider">or join a room</div>
    <div class="field">
      <label>Room Code</label>
      <input id="inpCode" type="text" placeholder="e.g. TRINI" maxlength="8" autocomplete="off" style="text-transform:uppercase">
    </div>
    <button class="btn btn-secondary" onclick="doJoin()">Join Room</button>
    <div id="lobbyErr" class="err"></div>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="waiting" class="screen">
  <div class="waiting-box">
    <div style="text-align:center;margin-bottom:.9rem">
      <div class="game-title" style="font-size:1.7rem">All Fours</div>
      <div style="font-size:.76rem;color:var(--text-muted);margin-top:.2rem">Share this code with 3 friends</div>
    </div>
    <div class="room-code" id="dispCode">——</div>
    <div style="margin:1.1rem 0" id="pSlots"></div>
    <div style="font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-muted);text-align:center;margin-bottom:.7rem">
      <span style="color:var(--teamA)">p0 + p2 = Team A</span> &nbsp;·&nbsp; <span style="color:var(--teamB)">p1 + p3 = Team B</span>
    </div>
    <button id="startBtn" class="btn btn-gold" onclick="doStart()" style="display:none">Start Game</button>
    <div id="waitHint" style="font-size:.78rem;color:var(--text-muted);text-align:center;margin-top:.5rem"></div>
    <button class="btn btn-secondary" style="margin-top:.7rem" onclick="leaveRoom()">Leave</button>
    <div id="waitErr" class="err"></div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-wrap">

    <div class="topbar">
      <div class="score-box">
        <div class="score-team">
          <div class="score-label" style="color:var(--teamA)">Team A</div>
          <div class="score-val" id="sA">0</div>
        </div>
        <div class="score-vs">vs</div>
        <div class="score-team">
          <div class="score-label" style="color:var(--teamB)">Team B</div>
          <div class="score-val" id="sB">0</div>
        </div>
      </div>
      <div class="trump-badge">
        <span class="trump-sym" id="trumpSym">—</span>
        <span class="trump-lbl">Trump</span>
      </div>
      <div style="font-size:.62rem;color:var(--text-muted);text-align:right;line-height:1.4">
        <div id="myTeamLbl"></div>
        <div id="rndLbl">Rnd 1</div>
      </div>
    </div>

    <div class="action-bar" id="actBar"></div>

    <div class="table-area">
      <div class="felt" id="felt">

        <div class="turnup-area" id="tuArea" style="display:none">
          <div class="turnup-lbl">Turn-up</div>
          <div id="tuCard"></div>
        </div>

        <div class="opp-top" id="oppTop">
          <div class="opp-avatar" id="avTop">🎭</div>
          <div class="opp-name" id="nmTop">—</div>
          <div class="mini-hand" id="hdTop"></div>
        </div>
        <div class="opp-side opp-left" id="oppLeft">
          <div class="opp-avatar" id="avLeft">🎭</div>
          <div class="opp-name" id="nmLeft">—</div>
          <div class="mini-hand" id="hdLeft"></div>
        </div>
        <div class="opp-side opp-right" id="oppRight">
          <div class="opp-avatar" id="avRight">🎭</div>
          <div class="opp-name" id="nmRight">—</div>
          <div class="mini-hand" id="hdRight"></div>
        </div>

        <div class="trick-area">
          <div class="ts t-top"    id="trTop"></div>
          <div class="ts t-left"   id="trLeft"></div>
          <div class="ts t-center" id="trCenter"></div>
          <div class="ts t-right"  id="trRight"></div>
          <div class="ts t-bottom" id="trBottom"></div>
        </div>

        <div class="phase-banner" id="pBanner" style="display:none">
          <h3 id="bTitle"></h3>
          <p  id="bMsg"></p>
          <div class="btn-row" id="bBtns"></div>
        </div>

      </div>
    </div>

    <div class="hand-area">
      <div class="hand-lbl">
        <span class="you-name" id="myNm">You</span>
        <span id="myTTeam"></span>
        <span id="myDlrTag" style="display:none;font-size:.58rem;color:var(--gold)">· DEALER</span>
      </div>
      <div class="hand-cards" id="myHand"></div>
    </div>

  </div>
</div>

<!-- ROUND MODAL -->
<div class="overlay" id="roundModal">
  <div class="modal">
    <h2 id="rndTitle">Round Over</h2>
    <table class="sum-table">
      <thead><tr><th>Point</th><th style="color:var(--teamA)">Team A</th><th style="color:var(--teamB)">Team B</th></tr></thead>
      <tbody id="sumBody"></tbody>
      <tfoot><tr class="total-row"><td>Points</td><td id="totA" style="text-align:center"></td><td id="totB" style="text-align:center"></td></tr></tfoot>
    </table>
    <div style="font-size:.78rem;color:var(--text-secondary);text-align:center" id="scoreLineEl"></div>
    <div class="modal-actions" id="rndActions"></div>
  </div>
</div>

<!-- GAME OVER MODAL -->
<div class="overlay" id="goModal">
  <div class="modal" style="text-align:center">
    <div style="font-size:2.4rem;margin-bottom:.4rem" id="goEmoji">🎉</div>
    <h2 id="goTitle">Team A Wins!</h2>
    <div style="font-size:.82rem;color:var(--text-secondary);margin:.4rem 0" id="goScore"></div>
    <div style="font-size:.76rem;color:var(--text-muted)" id="goGames"></div>
    <div class="modal-actions" style="margin-top:1.1rem">
      <button id="paBtn" class="btn btn-gold" onclick="doPlayAgain()" style="display:none">Play Again</button>
      <button class="btn btn-secondary" onclick="leaveRoom()">Leave</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Card Rendering ───────────────────────────────────────────────────────────
const SYM = {S:'♠',H:'♥',D:'♦',C:'♣'};
const CLR = {S:'black',H:'red',D:'red',C:'black'};

function mkCard(code, size='', playable=false) {
  if (!code || code==='back')
    return `<div class="card back ${size}"></div>`;
  const r=code.slice(0,-1), s=code.slice(-1);
  const sym=SYM[s]||s, cl=CLR[s]||'black';
  const onclick = playable ? `onclick="playCard('${code}')"` : '';
  return `<div class="card ${size} ${playable?'playable':''}" ${onclick}>
    <div class="card-inner">
      <div><div class="cr ${cl}">${r}</div><div class="cs ${cl}">${sym}</div></div>
      <div style="transform:rotate(180deg)"><div class="cr ${cl}">${r}</div><div class="cs ${cl}">${sym}</div></div>
    </div>
    <div class="cc ${cl}">${sym}</div>
  </div>`;
}

function trumpDisplay(ts) {
  if (!ts) return {html:'—',color:'var(--text-muted)'};
  const sym=SYM[ts]||ts;
  const color=(CLR[ts]==='red')?'#dc2626':'#1a1a2e';
  return {html:`<span style="color:${color}">${sym}</span>`,color};
}

// ─── WebSocket ─────────────────────────────────────────────────────────────────
let ws=null, myRole=null, myName='', myRoom='', state=null;

function connect(cb) {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen    = cb;
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose   = () => toast('Disconnected',true);
  ws.onerror   = ()=>{};
  setInterval(()=>{ if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'ping'})); },25000);
}
function emit(m){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(m)); }

function handleMsg(msg) {
  if (msg.type==='created')     { myRole=msg.role; state=msg.state; showWaiting(); }
  else if (msg.type==='joined') { myRole=msg.role; state=msg.state; showWaiting(); }
  else if (msg.type==='lobby_update'){ state=msg.state; renderWaiting(); }
  else if (msg.type==='state')  {
    state=msg.state;
    if (state.phase==='round_over')     showRoundModal();
    else if (state.phase==='game_over') showGameOver();
    else { closeModals(); renderGame(); }
  }
  else if (msg.type==='error')        { toast(msg.msg,true); showErr(msg.msg); }
  else if (msg.type==='player_left')  { toast(`${msg.name||msg.role} left`,true); }
}

// ─── Screens ──────────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showWaiting(){ showScreen('waiting'); renderWaiting(); }
function closeModals(){
  document.getElementById('roundModal').classList.remove('open');
  document.getElementById('goModal').classList.remove('open');
}

// ─── Lobby ────────────────────────────────────────────────────────────────────
function doCreate(){
  const name=document.getElementById('inpName').value.trim();
  if (!name) return showErr('Enter your name first');
  const code=Math.random().toString(36).slice(2,6).toUpperCase();
  myName=name; myRoom=code;
  connect(()=>emit({type:'create',code,name}));
}
function doJoin(){
  const name=document.getElementById('inpName').value.trim();
  const code=document.getElementById('inpCode').value.trim().toUpperCase();
  if (!name) return showErr('Enter your name first');
  if (!code) return showErr('Enter a room code');
  myName=name; myRoom=code;
  connect(()=>emit({type:'join',code,name}));
}
function showErr(msg){
  const active=document.querySelector('.screen.active');
  const el=active?active.querySelector('.err'):null;
  if (!el) return toast(msg,true);
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

// ─── Waiting ──────────────────────────────────────────────────────────────────
const TEAMS=['A','B','A','B'];
function renderWaiting(){
  document.getElementById('dispCode').textContent=myRoom;
  document.getElementById('pSlots').innerHTML=['p0','p1','p2','p3'].map((r,i)=>{
    const n=state?.[r]; const f=!!n;
    return `<div class="p-slot ${f?'filled':''}">
      <div class="dot"></div>
      <div class="p-slot-name">${n||`Player ${i+1} — waiting…`}</div>
      ${f?`<span class="t-tag ${TEAMS[i]==='A'?'ta':'tb'}">Team ${TEAMS[i]}</span>`:''}
    </div>`;
  }).join('');
  const pc=state?.playerCount||0;
  const sb=document.getElementById('startBtn');
  const wh=document.getElementById('waitHint');
  if (myRole==='p0'&&pc>=4){ sb.style.display='block'; wh.textContent='All players joined! Ready to start.'; }
  else { sb.style.display='none'; wh.textContent=`${pc}/4 players · code: ${myRoom}`; }
}

// ─── Game ─────────────────────────────────────────────────────────────────────
function roles(){
  const all=['p0','p1','p2','p3'];
  const i=all.indexOf(myRole);
  return { me:myRole, top:all[(i+2)%4], left:all[(i+3)%4], right:all[(i+1)%4] };
}
function teamOf(role){
  if (!state?.teams) return null;
  return state.teams.A.includes(role)?'A':state.teams.B.includes(role)?'B':null;
}
function teamTag(role){
  const t=teamOf(role);
  if (!t) return '';
  return `<span class="t-tag ${t==='A'?'ta':'tb'}">T${t}</span>`;
}

function renderGame(){
  if (!state||state.phase==='round_over'||state.phase==='game_over') return;
  const s=state;
  const {me,top,left,right}=roles();

  // Scores
  document.getElementById('sA').textContent=s.scores?.A??0;
  document.getElementById('sB').textContent=s.scores?.B??0;
  document.getElementById('rndLbl').textContent=`Rnd ${s.round||1}`;

  // My team
  const mt=teamOf(me);
  document.getElementById('myTeamLbl').textContent=mt?`Team ${mt}`:'';

  // Trump
  const td=trumpDisplay(s.trumpSuit);
  document.getElementById('trumpSym').innerHTML=td.html;

  // Action
  document.getElementById('actBar').textContent=s.action||'';

  // Turn-up
  const tua=document.getElementById('tuArea');
  if (s.turnUp && s.phase!=='playing'){
    tua.style.display='block';
    document.getElementById('tuCard').innerHTML=mkCard(s.turnUp,'tiny');
  } else tua.style.display='none';

  // Opponents
  renderOpp('Top',   top,  s);
  renderOpp('Left',  left, s);
  renderOpp('Right', right,s);

  // My hand
  document.getElementById('myNm').textContent=myName||me;
  const myT=document.getElementById('myTTeam');
  if (mt){
    myT.className=`t-tag ${mt==='A'?'ta':'tb'}`;
    myT.textContent=`Team ${mt}`;
    myT.style.cssText='font-size:.6rem;padding:.1rem .4rem;border-radius:10px';
  }
  document.getElementById('myDlrTag').style.display=s.dealer===me?'inline':'none';

  const hand=s.hands?.[me]||[];
  const canPlay=s.phase==='playing'&&s.turn===me;
  document.getElementById('myHand').innerHTML=hand.map(c=>mkCard(c,'',canPlay)).join('');

  // Trick
  const tmap={[me]:'Bottom',[top]:'Top',[left]:'Left',[right]:'Right'};
  ['Top','Left','Center','Right','Bottom'].forEach(p=>document.getElementById(`tr${p}`).innerHTML='');
  for (const [r,c] of Object.entries(s.trick||{})){
    const pos=tmap[r]||'Center';
    document.getElementById(`tr${pos}`).innerHTML=mkCard(c,'sm');
  }

  // Phase banner
  renderBanner(me,s);

  if (!document.getElementById('game').classList.contains('active')) showScreen('game');
}

function renderOpp(pos,role,s){
  const isT=s.turn===role, isD=s.dealer===role;
  document.getElementById(`av${pos}`).className=`opp-avatar ${isT?'is-turn':''} ${isD?'is-dealer':''}`;
  document.getElementById(`nm${pos}`).innerHTML=`${s[role]||role} ${teamTag(role)}`;
  document.getElementById(`hd${pos}`).innerHTML=(s.hands?.[role]||[]).map(()=>`<div class="mc"></div>`).join('');
}

function renderBanner(me,s){
  const b=document.getElementById('pBanner');
  b.style.display='none';
  document.getElementById('bBtns').innerHTML='';

  const show=(title,msg,btns)=>{
    b.style.display='block';
    document.getElementById('bTitle').textContent=title;
    document.getElementById('bMsg').textContent=msg;
    document.getElementById('bBtns').innerHTML=btns||'';
  };

  if (s.phase==='bet'){
    if (me===s.beggar){
      const ts=s.trumpSuit; const sym=SYM[ts]||ts;
      show('Beg or Stand?',`Turn-up: ${sym} (${ts} is trump)`,
        `<button class="btn btn-primary btn-sm" onclick="doBeg()">Beg</button>
         <button class="btn btn-secondary btn-sm" onclick="doStand()">Stand</button>`);
    } else if (me===s.dealer){
      show('Waiting…',`${s[s.beggar]||s.beggar} is deciding`,'');
    }
  }
  else if (s.phase==='give_one'){
    if (me===s.dealer){
      show('They Begged!','Give them a point, or run the pack?',
        `<button class="btn btn-secondary btn-sm" onclick="doGiveOne()">Give One</button>
         <button class="btn btn-primary btn-sm" onclick="doRunPack()">Run Pack</button>`);
    } else {
      show('Pack Decision',`${s[s.dealer]||s.dealer} is deciding…`,'');
    }
  }
  else if (s.phase==='flip_again'){
    if (me===s.dealer){
      show('Same Suit!','Same suit turned — flip another card.',
        `<button class="btn btn-primary btn-sm" onclick="doRunPack()">Flip Again</button>`);
    } else {
      show('Same Suit Turned',`${s[s.dealer]||s.dealer} must flip again`,'');
    }
  }
  else if (s.phase==='redeal'){
    if (me===s.dealer){
      show('Pack Depleted','The pack ran out. Redeal.',
        `<button class="btn btn-primary btn-sm" onclick="doRedeal()">Redeal</button>`);
    } else {
      show('Pack Depleted',`${s[s.dealer]||s.dealer} must redeal`,'');
    }
  }
}

// ─── Round Modal ──────────────────────────────────────────────────────────────
function showRoundModal(){
  if (!state) return;
  renderGame();
  const s=state;
  const det=s.roundDetail||{A:{},B:{}};
  const pts=s.roundPts||{A:0,B:0};
  document.getElementById('rndTitle').textContent='Round Over';

  const rows=[
    {lbl:'High',      a:det.A.high?`${det.A.high} +1`:'',     b:det.B.high?`${det.B.high} +1`:''},
    {lbl:'Low',       a:det.A.low?`${det.A.low} +1`:'',        b:det.B.low?`${det.B.low} +1`:''},
    {lbl:'Jack',      a:det.A.jack?'Jack +1':'',                b:det.B.jack?'Jack +1':''},
    {lbl:'Hang Jack', a:det.A.hangJack?'Hang Jack +3':'',       b:det.B.hangJack?'Hang Jack +3':''},
    {lbl:'Game',      a:det.A.game?`${det.A.game}pts +1`:'',   b:det.B.game?`${det.B.game}pts +1`:''},
  ].filter(r=>r.a||r.b);

  document.getElementById('sumBody').innerHTML=rows.length
    ? rows.map(r=>`<tr>
        <td>${r.lbl}</td>
        <td class="pts" style="color:var(--teamA)">${r.a}</td>
        <td class="pts" style="color:var(--teamB)">${r.b}</td>
      </tr>`).join('')
    : '<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">No points scored</td></tr>';

  document.getElementById('totA').innerHTML=`<span class="pts" style="color:var(--teamA)">+${pts.A}</span>`;
  document.getElementById('totB').innerHTML=`<span class="pts" style="color:var(--teamB)">+${pts.B}</span>`;
  document.getElementById('scoreLineEl').textContent=`Running: Team A ${s.scores.A}  ·  Team B ${s.scores.B}  (first to 14)`;

  const ra=document.getElementById('rndActions');
  if (myRole===s.dealer){
    ra.innerHTML=`<button class="btn btn-gold" onclick="doDeal()">Deal Next Round</button>`;
  } else {
    ra.innerHTML=`<div style="color:var(--text-muted);font-size:.8rem;width:100%;text-align:center">Waiting for ${s[s.dealer]||s.dealer} to deal…</div>`;
  }
  document.getElementById('roundModal').classList.add('open');
}

// ─── Game Over ────────────────────────────────────────────────────────────────
function showGameOver(){
  if (!state) return;
  const s=state;
  const mt=teamOf(myRole);
  const won=s.winner===mt;
  document.getElementById('goEmoji').textContent=won?'🎉':'😔';
  document.getElementById('goTitle').textContent=`Team ${s.winner} Wins!`;
  document.getElementById('goScore').textContent=`Final: Team A ${s.scores.A} — Team B ${s.scores.B}`;
  document.getElementById('goGames').textContent=
    s.gamesWon?`Games won — A: ${s.gamesWon.A||0}  B: ${s.gamesWon.B||0}`:'';
  document.getElementById('paBtn').style.display=myRole==='p0'?'block':'none';
  document.getElementById('roundModal').classList.remove('open');
  document.getElementById('goModal').classList.add('open');
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function doStart()    { emit({type:'start_game'}); }
function doDeal()     { document.getElementById('roundModal').classList.remove('open'); emit({type:'deal'}); }
function doBeg()      { emit({type:'beg'}); }
function doStand()    { emit({type:'stand'}); }
function doGiveOne()  { emit({type:'give_one'}); }
function doRunPack()  { emit({type:'run_pack'}); }
function doRedeal()   { emit({type:'redeal'}); }
function doPlayAgain(){ document.getElementById('goModal').classList.remove('open'); emit({type:'play_again'}); }
function playCard(card){ emit({type:'play_card',card}); }
function leaveRoom()  { if(ws)ws.close(); ws=null; myRole=null; state=null; myRoom=''; closeModals(); showScreen('lobby'); }

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${err?'is-err':''} show`;
  setTimeout(()=>el.classList.remove('show'),3200);
}

// ─── Enter key ────────────────────────────────────────────────────────────────
document.getElementById('inpCode').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin()});
document.getElementById('inpName').addEventListener('keydown',e=>{if(e.key==='Enter')doCreate()});
</script>
